name: verify
on: [pull_request]

# Advisory by default: this check can fail (red X) without blocking the merge.
# To make it blocking, mark it as "required" in Branch protection (governance decision).
jobs:
  self-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Harness self-verification
        run: bash tests/run.sh
      # Placeholder (agent-driven /verify in CI): posting the verification-report as a PR comment
      # is up to each project — depends on the stack and the eval runner.
