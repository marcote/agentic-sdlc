name: amendment-gate
on:
  pull_request:
  push:
    branches: [main]

# Unlike `verify` (advisory), this check is designed to be REQUIRED in
# branch protection for `main` (see scripts/setup-branch-protection.sh): it enforces the
# North Star amendment protocol. Narrow block — fires only when the pillars/scope
# sets of the canonical JSON block change without ADR/schema/suite (see the D1 delta
# of the constitution). Normal feature work passes green (exit 0, not-applicable).
jobs:
  amendment-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: the gate compares base..head of the North Star
      - name: Derivar el rango base..head
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Amendment gate (North Star pillars/scope)
        run: bash scripts/amendment-gate.sh --range "${{ steps.range.outputs.range }}"
